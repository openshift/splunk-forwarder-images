apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/openshift/splunk-forwarder-images?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: 'true'
    pipelinesascode.tekton.dev/max-keep-runs: '3'
    pipelinesascode.tekton.dev/on-cel-expression: "event == \"pull_request\" \n&&\
      \ target_branch == \"master\"\n&& (\"build/Dockerfile\".pathChanged() ||\n\
      \    \".splunk-version\".pathChanged() ||\n    \".splunk-version-hash\".pathChanged()\
      \ ||\n    \".tekton/splunk-forwarder-images-pull-request.yaml\".pathChanged()\
      \ )\n"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: splunk-forwarder-images
    appstudio.openshift.io/component: splunk-forwarder-images
    pipelines.appstudio.openshift.io/type: build
  name: splunk-forwarder-images-on-pull-request
  namespace: splunk-forwarder-images-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/splunk-forwarder-images-tenant/openshift/splunk-forwarder-images:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build/Dockerfile
  - name: path-context
    value: .
  taskRunTemplate:
    serviceAccountName: build-pipeline-splunk-forwarder-images
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/openshift/boilerplate
    - name: revision
      value: master
    - name: pathInRepo
      value: pipelines/docker-build-oci-ta/pipeline.yaml
status: {}
